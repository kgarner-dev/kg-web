<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <link rel="icon" href="%sveltekit.assets%/favicon.ico" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  %sveltekit.head%
  <script>
    (function () {
      try {
        var p = JSON.parse(localStorage.getItem('kg_profile') || 'null');
        if (!p) return;
        var el = document.documentElement;
        if (p.theme === 'dark') el.setAttribute('data-theme', 'dark');
        if (p.accentColor) el.style.setProperty('--color-accent', p.accentColor);
      } catch (e) { }
    })();
  </script>
</head>

<body data-sveltekit-preload-data="hover">
  <div style="display: contents">%sveltekit.body%</div>
</body>

</html>
