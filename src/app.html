<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <link rel="icon" href="%sveltekit.assets%/favicon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="" />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet">
  <link rel="stylesheet" type="text/css"
    href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.2/src/bold/style.css" />
  %sveltekit.head%
  <!-- Runs synchronously before first paint — prevents theme/accent flash -->
  <script>
    (function () {
      try {
        var p = JSON.parse(localStorage.getItem('kg_profile') || 'null');
        if (!p) return;
        var COLORS = { amber: '#f59e0b', clay: '#c4704f', blue: '#3b82f6', sage: '#6b8f6e' };
        var el = document.documentElement;
        if (p.theme === 'dark') el.setAttribute('data-theme', 'dark');
        el.style.setProperty('--color-accent', COLORS[p.accentColor] || COLORS.amber);
      } catch (e) {}
    })();
  </script>
</head>

<body data-sveltekit-preload-data="hover">
  <div style="display: contents">%sveltekit.body%</div>
</body>

</html>
